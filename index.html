<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michi-Acariciador 3000</title>
    <style>
        :root {
            --bg-color: #f0f4f8; /* Azul grisáceo muy claro */
            --primary-color: #ff9fb2; /* Rosa pastel para detalles */
            --accent-color: #a8dadc; /* Azul pastel para la UI */
            --text-color: #444;
            --box-color: #d1b48c; /* Color cartón para las cajas */
            --cat-color-1: #6a6a6a; /* Gato gris */
            --cat-color-2: #e0ac69; /* Gato naranja */
            --cat-color-3: #222;     /* Gato negro */
        }

        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');

        body {
            font-family: 'Varela Round', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* Evita scrolls raros en móviles */
        }

        /* --- UI Elements --- */
        #game-ui {
            text-align: center;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
        }

        h1 { margin: 0; font-size: 2rem; color: #ff8ca3; }
        #instructions { font-size: 0.9rem; color: #777; margin-bottom: 10px; }

        .stats-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .stat { display: flex; align-items: center; gap: 8px; }
        .stat i { font-style: normal; } /* For emojis */

        #start-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 10px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 3px 10px rgba(255, 159, 178, 0.4);
        }

        #start-btn:hover { background-color: #ff8ca3; transform: scale(1.05); }
        #start-btn:active { transform: scale(0.95); }

        /* --- Game Area --- */
        #game-area {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 600px;
            width: 90%;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        @media (max-width: 500px) {
            #game-area { grid-template-columns: repeat(2, 1fr); }
            #game-area > div:nth-child(5), #game-area > div:nth-child(6) { display: none; } /* Oculta los últimos 2 en móvil muy pequeño */
        }

        .hole {
            position: relative;
            aspect-ratio: 1; /* Cajas cuadradas */
            background-color: var(--box-color);
            border-radius: 15px;
            overflow: hidden; /* Importante para que el gato parezca salir */
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.1);
        }

        /* La "tapa" de la caja que oculta al gato al principio */
        .hole::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 0; width: 100%; height: 25%;
            background-color: var(--box-color);
            border-radius: 10px;
            z-index: 10;
        }

        /* --- CSS CATS (Hechos solo con CSS, sin imágenes) --- */
        .cat {
            position: absolute;
            width: 80%;
            height: 100%;
            bottom: -110%; /* Empieza totalmente oculto abajo */
            left: 10%;
            transition: bottom 0.2s ease-out; /* Velocidad de aparición */
            cursor: pointer;
            z-index: 5;
        }

        /* Clase activada por JS para que el gato "salte" */
        .cat.up { bottom: -10%; } 

        .cat-body {
            position: absolute;
            bottom: 0; width: 100%; height: 70%;
            background-color: var(--cat-color-1); /* Color base (gris por defecto) */
            border-radius: 50px 50px 0 0;
            box-shadow: inset 0 -10px 10px rgba(0,0,0,0.1);
        }

        /* Variaciones de color de los gatos */
        .hole.c1 .cat-body { background-color: var(--cat-color-1); }
        .hole.c2 .cat-body { background-color: var(--cat-color-2); }
        .hole.c3 .cat-body { background-color: var(--cat-color-3); }

        .cat-ear {
            position: absolute;
            top: -15px; width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 30px solid var(--cat-color-1);
        }
        .hole.c1 .cat-ear { border-bottom-color: var(--cat-color-1); }
        .hole.c2 .cat-ear { border-bottom-color: var(--cat-color-2); }
        .hole.c3 .cat-ear { border-bottom-color: var(--cat-color-3); }

        .cat-ear.left { left: 5px; transform: rotate(-15deg); }
        .cat-ear.right { right: 5px; transform: rotate(15deg); }

        .cat-eye {
            position: absolute;
            top: 25%; width: 10px; height: 10px;
            background-color: white;
            border-radius: 50%;
        }
        .cat-eye::after {
            content: ''; position: absolute;
            top: 2px; left: 3px; width: 4px; height: 4px;
            background-color: black; border-radius: 50%;
        }
        .cat-eye.left { left: 20%; }
        .cat-eye.right { right: 20%; }

        .cat-nose {
            position: absolute;
            top: 45%; left: calc(50% - 5px);
            width: 0; height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid #ffb6c1; /* Rosa nariz */
            border-radius: 2px;
        }

        /* --- Feedback de "Acariciado" --- */
        .cat.pet {
            animation: petEffect 0.4s ease;
        }

        @keyframes petEffect {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) translateY(-10px) rotate(5deg); }
            100% { transform: scale(1); }
        }

        /* Partícula de corazón que sale al acariciar */
        .heart-particle {
            position: absolute;
            color: #ff6b81;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 20;
            animation: heartFade 0.6s ease-out forwards;
        }

        @keyframes heartFade {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
        }

        /* --- Game Over Overlay --- */
        #game-over {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: none; /* Oculto al principio */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        #game-over h2 { font-size: 3rem; color: var(--primary-color); margin-bottom: 10px; }
        #final-score-msg { font-size: 1.5rem; margin-bottom: 20px; }

    </style>
</head>
<body>

    <div id="game-over">
        <h2>🐈 ¡Tiempo Agotado! 🐈</h2>
        <p id="final-score-msg"></p>
        <button id="restart-btn" onclick="startGame()" style="background-color: var(--accent-color); color: #333; padding: 15px 30px; border:none; border-radius: 50px; font-weight:bold; cursor:pointer;">¿Otra caricia?</button>
    </div>

    <div id="game-ui">
        <h1>Michi-Acariciador 3000</h1>
        <p id="instructions">¡Acaricia (haz clic) a los gatitos que salgan de sus cajas antes de que se escondan!</p>
        
        <div class="stats-bar">
            <div class="stat"><i>💖</i> Acariciados: <span id="score">0</span></div>
            <div class="stat"><i>⏱️</i> Tiempo: <span id="time">15</span>s</div>
        </div>

        <button id="start-btn" onclick="startGame()">¡Empezar Acariciación!</button>
    </div>

    <div id="game-area">
        <div class="hole c1"><div class="cat">
            <div class="cat-ear left"></div><div class="cat-ear right"></div>
            <div class="cat-body"><div class="cat-eye left"></div><div class="cat-eye right"></div><div class="cat-nose"></div></div>
        </div></div>
        <div class="hole c2"><div class="cat">
            <div class="cat-ear left"></div><div class="cat-ear right"></div>
            <div class="cat-body"><div class="cat-eye left"></div><div class="cat-eye right"></div><div class="cat-nose"></div></div>
        </div></div>
        <div class="hole c3"><div class="cat">
            <div class="cat-ear left"></div><div class="cat-ear right"></div>
            <div class="cat-body"><div class="cat-eye left"></div><div class="cat-eye right"></div><div class="cat-nose"></div></div>
        </div></div>
        <div class="hole c1"><div class="cat">
            <div class="cat-ear left"></div><div class="cat-ear right"></div>
            <div class="cat-body"><div class="cat-eye left"></div><div class="cat-eye right"></div><div class="cat-nose"></div></div>
        </div></div>
        <div class="hole c2"><div class="cat">
            <div class="cat-ear left"></div><div class="cat-ear right"></div>
            <div class="cat-body"><div class="cat-eye left"></div><div class="cat-eye right"></div><div class="cat-nose"></div></div>
        </div></div>
        <div class="hole c3"><div class="cat">
            <div class="cat-ear left"></div><div class="cat-ear right"></div>
            <div class="cat-body"><div class="cat-eye left"></div><div class="cat-eye right"></div><div class="cat-nose"></div></div>
        </div></div>
    </div>

    <script>
        // --- Variables de Estado del Juego ---
        const holes = document.querySelectorAll('.hole');
        const cats = document.querySelectorAll('.cat');
        const scoreBoard = document.getElementById('score');
        const timeBoard = document.getElementById('time');
        const startBtn = document.getElementById('start-btn');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreMsg = document.getElementById('final-score-msg');

        let lastHole; // Para no repetir la misma caja dos veces seguidas
        let timeUp = false; // Bandera de fin de tiempo
        let score = 0;
        let countdown; // Intervalo del temporizador
        let gameTimer; // Timeout para el bucle de aparición

        // --- Configuración Principal ---
        const GAME_DURATION = 15; // Segundos por partida
        const MIN_CAT_UP_TIME = 400; //ms que el gato está arriba como mínimo
        const MAX_CAT_UP_TIME = 1000; //ms que el gato está arriba como máximo

        // --- Funciones Lógicas del Juego ---

        // Elige una caja aleatoria que no sea la última
        function randomHole(holesList) {
            const idx = Math.floor(Math.random() * holesList.length);
            const hole = holesList[idx];
            if (hole === lastHole) return randomHole(holesList);
            lastHole = hole;
            return hole;
        }

        // Elige un tiempo aleatorio que el gato estará arriba
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        // Bucle principal: hace aparecer a un gato
        function peep() {
            if (timeUp) return; // Si el tiempo acabó, paramos el bucle

            const time = randomTime(MIN_CAT_UP_TIME, MAX_CAT_UP_TIME);
            const hole = randomHole(holes);
            const cat = hole.querySelector('.cat');
            
            cat.classList.remove('pet'); // Limpiamos estado anterior
            cat.classList.add('up'); // Gato aparece

            // El gato se esconde tras el tiempo aleatorio
            gameTimer = setTimeout(() => {
                cat.classList.remove('up');
                if (!timeUp) peep(); // Llama a la siguiente aparición
            }, time);
        }

        // Función que se ejecuta al hacer clic en un gato
        function petCat(e) {
            if (!e.isTrusted) return; // Evita clics por scripts/trampas
            const cat = this;

            // Si el gato ya fue acariciado o está escondiéndose, no cuenta
            if (cat.classList.contains('pet') || !cat.classList.contains('up')) return;

            score++;
            cat.classList.add('pet'); // Añade animación de acariciado
            scoreBoard.textContent = score;

            // Feedback visual: Partícula de corazón
            createHeartParticle(e.clientX, e.clientY);
        }

        // Crea un emoji de corazón donde se hizo el clic
        function createHeartParticle(x, y) {
            const heart = document.createElement('div');
            heart.classList.add('heart-particle');
            heart.textContent = '❤️';
            heart.style.left = `${x - 10}px`;
            heart.style.top = `${y - 10}px`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 600); // Limpia la partícula
        }

        // Inicia/Reinicia el juego
        function startGame() {
            // Reinicio de UI y estados
            gameOverScreen.style.display = 'none';
            startBtn.style.display = 'none'; // Oculta el botón mientras juegas
            scoreBoard.textContent = 0;
            timeBoard.textContent = GAME_DURATION;
            
            score = 0;
            timeUp = false;
            let timeLeft = GAME_DURATION;

            // Limpia cualquier gato que haya quedado arriba
            cats.forEach(cat => cat.classList.remove('up', 'pet'));

            // Inicia el temporizador visual
            countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    endGame();
                }
                if (timeLeft >= 0) timeBoard.textContent = timeLeft;
            }, 1000);

            // Inicia el bucle de los gatos
            peep();
        }

        // Finaliza la partida
        function endGame() {
            timeUp = true;
            clearTimeout(gameTimer); // Para el bucle inmediato
            
            // Muestra Game Over con puntuación
            finalScoreMsg.textContent = `Acariciaste a ${score} michis. ¡Eres adorable!`;
            gameOverScreen.style.display = 'flex';
            startBtn.style.display = 'inline-block'; // Reaparece el botón por si cierran el overlay
        }

        // --- Event Listeners ---
        cats.forEach(cat => cat.addEventListener('click', petCat));

    </script>
</body>
</html>
